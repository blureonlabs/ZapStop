services:
  - type: web
    name: zapstop-backend
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://zapstop.netlify.app,https://zapstop-app.netlify.app,http://localhost:3000
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
