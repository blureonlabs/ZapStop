services:
  - type: web
    name: zapstop-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://zapstop.netlify.app,https://zapstop-app.netlify.app,http://localhost:3000
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
