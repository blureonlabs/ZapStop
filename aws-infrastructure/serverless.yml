service: zapstop-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'me-central-1'}
  memorySize: 1024
  timeout: 30
  architecture:
    - x86_64
  
  environment:
    STAGE: ${self:provider.stage}
    REGION: ${self:provider.region}
    DB_SECRET_NAME: ${self:custom.dbSecretName}
    JWT_SECRET: ${self:custom.jwtSecret}
    JWT_REFRESH_SECRET: ${self:custom.jwtRefreshSecret}
    DEBUG: ${self:custom.debug}
    
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:${self:provider.region}:${aws:accountId}:secret:${self:custom.dbSecretName}*
        - Effect: Allow
          Action:
            - rds-db:connect
          Resource:
            - arn:aws:rds-db:${self:provider.region}:${aws:accountId}:dbuser:${self:custom.auroraClusterId}/${self:custom.dbUsername}
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:
  api:
    handler: lambda_handler.lambda_handler
    description: ZapStop FastAPI Lambda function
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
          cors: true
      - httpApi:
          path: /
          method: ANY
          cors: true
    vpc:
      securityGroupIds:
        - ${self:custom.lambdaSecurityGroupId}
      subnetIds:
        - ${self:custom.lambdaSubnetId1}
        - ${self:custom.lambdaSubnetId2}
    layers:
      - arn:aws:lambda:${self:provider.region}:336392948345:layer:AWSSDKPandas-Python311:1

plugins:
  - serverless-python-requirements

custom:
  # Database configuration
  dbSecretName: zapstop/aurora/credentials
  
  # JWT secrets (generate these)
  jwtSecret: ${env:JWT_SECRET, 'your-super-secret-jwt-key-change-in-production'}
  jwtRefreshSecret: ${env:JWT_REFRESH_SECRET, 'your-super-secret-refresh-key-change-in-production'}
  
  # Aurora configuration
  auroraClusterId: zapstop-aurora-cluster
  dbUsername: zapstop_user
  
  # VPC configuration (using default VPC in UAE)
  lambdaSecurityGroupId: sg-0067ef1f4b19805aa
  lambdaSubnetId1: subnet-05f1dbb4127a433fa
  lambdaSubnetId2: subnet-05c2fb6180b27ac77
  
  # Debug mode
  debug: ${self:provider.stage, 'dev'}

  pythonRequirements:
    dockerizePip: true
    layer:
      name: zapstop-dependencies
      description: ZapStop Python dependencies
      compatibleRuntimes:
        - python3.11
      retain: false

resources:
  Resources:
    # RDS PostgreSQL Instance (Free Tier Compatible)
    RDSInstance:
      Type: AWS::RDS::DBInstance
      Properties:
        DBInstanceIdentifier: ${self:custom.auroraClusterId}
        Engine: postgres
        EngineVersion: '15.4'
        DBInstanceClass: db.t3.micro
        AllocatedStorage: 20
        StorageType: gp2
        DBName: zapstop
        MasterUsername: ${self:custom.dbUsername}
        MasterUserPassword: !Ref DatabasePassword
        VpcSecurityGroupIds:
          - !Ref AuroraSecurityGroup
        DBSubnetGroupName: !Ref AuroraSubnetGroup
        BackupRetentionPeriod: 7
        PreferredBackupWindow: '03:00-04:00'
        PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
        DeletionProtection: false
        PubliclyAccessible: false
        MultiAZ: false
        StorageEncrypted: true
        Tags:
          - Key: Name
            Value: ${self:service}-rds-instance
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: zapstop

    # Security Group for RDS
    AuroraSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for RDS PostgreSQL instance
        VpcId: !Ref VPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref LambdaSecurityGroup
        Tags:
          - Key: Name
            Value: ${self:service}-aurora-sg

    # Security Group for Lambda
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Lambda functions
        VpcId: !Ref VPC
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0
        Tags:
          - Key: Name
            Value: ${self:service}-lambda-sg

    # DB Subnet Group
    AuroraSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: Subnet group for RDS PostgreSQL instance
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        Tags:
          - Key: Name
            Value: ${self:service}-aurora-subnet-group

    # Secrets Manager for database credentials
    DatabaseSecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:custom.dbSecretName}
        Description: Database credentials for ZapStop Aurora cluster
        SecretString: !Sub |
          {
            "username": "${self:custom.dbUsername}",
            "password": "${DatabasePassword}",
            "host": "${RDSInstance.Endpoint.Address}",
            "port": 5432,
            "dbname": "zapstop",
            "sslmode": "require"
          }
        Tags:
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: zapstop

    # Secrets Manager for Redis credentials (if using ElastiCache)
    RedisSecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:custom.redisSecretName}
        Description: Redis credentials for ZapStop
        SecretString: !Sub |
          {
            "host": "${RedisCluster.RedisEndpoint.Address}",
            "port": 6379,
            "password": ""
          }
        Tags:
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: zapstop

    # ElastiCache Redis Cluster (optional)
    RedisCluster:
      Type: AWS::ElastiCache::ReplicationGroup
      Properties:
        ReplicationGroupId: zapstop-redis
        Description: Redis cluster for ZapStop caching
        NodeType: cache.t3.micro
        Port: 6379
        NumCacheClusters: 1
        Engine: redis
        CacheSubnetGroupName: !Ref RedisSubnetGroup
        SecurityGroupIds:
          - !Ref RedisSecurityGroup
        AtRestEncryptionEnabled: true
        TransitEncryptionEnabled: false
        Tags:
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: zapstop


    # Password for database
    DatabasePassword:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:service}-db-password
        Description: Database password for ZapStop
        GenerateSecretString:
          SecretStringTemplate: '{"username":"${self:custom.dbUsername}"}'
          GenerateStringKey: 'password'
          PasswordLength: 32
          ExcludeCharacters: '"@/\'

  Parameters:
    VPC:
      Type: AWS::EC2::VPC::Id
      Default: vpc-088a2728ad0e90a83
      Description: VPC ID for the resources
    PrivateSubnet1:
      Type: AWS::EC2::Subnet::Id
      Default: subnet-05f1dbb4127a433fa
      Description: First private subnet for RDS
    PrivateSubnet2:
      Type: AWS::EC2::Subnet::Id
      Default: subnet-05c2fb6180b27ac77
      Description: Second private subnet for RDS

Outputs:
  ApiGatewayRestApiId:
    Value: !Ref HttpApi
    Export:
      Name: ${self:service}-${self:provider.stage}-api-id

  ApiGatewayRestApiRootResourceId:
    Value: !GetAtt HttpApi.RootResourceId
    Export:
      Name: ${self:service}-${self:provider.stage}-api-root-resource-id

  ApiGatewayUrl:
    Value: !Sub 'https://${HttpApi}.execute-api.${self:provider.region}.amazonaws.com'
    Export:
      Name: ${self:service}-${self:provider.stage}-api-url

  RDSInstanceEndpoint:
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: ${self:service}-${self:provider.stage}-rds-endpoint

  RDSInstancePort:
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: ${self:service}-${self:provider.stage}-rds-port

  DatabaseSecretArn:
    Value: !Ref DatabaseSecret
    Export:
      Name: ${self:service}-${self:provider.stage}-db-secret-arn

  RedisEndpoint:
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Export:
      Name: ${self:service}-${self:provider.stage}-redis-endpoint
